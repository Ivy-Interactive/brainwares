name: Release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag and release (e.g. 0.1.1). Leave blank to auto-increment patch version.'
        required: false
        default: ''

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and bump version
        id: resolve
        run: |
          CURRENT_VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            NEW_VERSION="$INPUT_VERSION"
          else
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            NEW_VERSION="$major.$minor.$((patch + 1))"
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          
          # Check if tag already exists locally or on remote
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1 || git ls-remote --tags origin "refs/tags/v$NEW_VERSION" | grep -q "refs/tags/v$NEW_VERSION"; then
            echo "Error: Tag v$NEW_VERSION already exists"
            exit 1
          fi

          # Update Cargo.toml
          sed -i 's/^version = ".*"/version = "'"$NEW_VERSION"'"/' Cargo.toml
          
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin main
          
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  build-binaries:
    needs: versioning
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
          - rid: win-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
          - rid: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - rid: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            suffix: ""
          - rid: osx-x64
            target: x86_64-apple-darwin
            os: macos-13
            suffix: ""
          - rid: osx-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout at Tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.versioning.outputs.version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      # Windows Codesigning
      - name: Prepare Windows binaries for signing
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p unsigned_binaries
          cp target/${{ matrix.target }}/release/bw.exe unsigned_binaries/
          cp target/${{ matrix.target }}/release/brainwares.exe unsigned_binaries/

      - name: Sign Windows binaries
        if: matrix.os == 'windows-latest'
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: unsigned_binaries
          output_path: signed_binaries

      - name: Replace with signed Windows binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp -f signed_binaries/*.exe target/${{ matrix.target }}/release/

      # macOS Codesigning
      - name: Import Apple Certificates (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: "temporary-keychain-pwd"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode the certificate p12
          echo -n "$MACOS_CERTIFICATE" | base64 --decode --output $CERTIFICATE_PATH

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -t 21600 -u $KEYCHAIN_PATH

          # Import p12
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
        
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild:,productsign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          codesign --force --options runtime --timestamp --keychain "$KEYCHAIN_PATH" --sign "${{ secrets.MACOS_SIGN_APP_IDENTITY }}" target/${{ matrix.target }}/release/bw
          codesign --force --options runtime --timestamp --keychain "$KEYCHAIN_PATH" --sign "${{ secrets.MACOS_SIGN_APP_IDENTITY }}" target/${{ matrix.target }}/release/brainwares

      # Packaging
      - name: Package Windows binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release_archive
          cp target/${{ matrix.target }}/release/bw.exe release_archive/
          cp target/${{ matrix.target }}/release/brainwares.exe release_archive/
          cd release_archive && zip -r ../brainwares-${{ matrix.rid }}.zip .

      - name: Package Unix binaries
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          tar -czf brainwares-${{ matrix.rid }}.tar.gz -C target/${{ matrix.target }}/release bw brainwares

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brainwares-binaries-${{ matrix.rid }}
          path: |
            brainwares-*.zip
            brainwares-*.tar.gz

  create-release:
    needs: [versioning, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: brainwares-binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.versioning.outputs.version }}
          tag_name: v${{ needs.versioning.outputs.version }}
          files: |
            brainwares-*.zip
            brainwares-*.tar.gz
          generate_release_notes: true
          make_latest: true
